server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Разрешаем доступ к геолокации и камере в embedded-контекстах mini-app.
    add_header Permissions-Policy "camera=*, geolocation=*" always;
    add_header Feature-Policy "camera *; geolocation *" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # API proxy - все запросы на /api идут в backend
    location /api/ {
        proxy_pass http://web_backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Статические файлы
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Все остальные запросы - index.html (для React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
